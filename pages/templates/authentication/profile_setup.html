{% extends "layouts/buyer_base.html" %}
{% block title %}Profile Setup{% endblock %}
{% block buyer_content %}
<section class="max-w-2xl mx-auto surface-card p-8">
  <p class="text-xs font-black uppercase tracking-widest text-golden-yellow">Account</p>
  <h1 class="mt-2 text-3xl font-black text-gray-900">Profile Setup</h1>
  <p class="mt-3 text-gray-500">Complete your profile so orders, support, and notifications work smoothly.</p>
  <form method="post" class="mt-8 space-y-4">{% csrf_token %}{% block profile_setup_form %}{% endblock %}</form>
</section>
{% endblock %}
