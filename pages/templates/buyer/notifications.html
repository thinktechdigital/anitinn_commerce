{% extends "layouts/buyer_base.html" %}{% block title %}Notifications{% endblock %}{% block buyer_content %}<section class="surface-card p-6"><h1 class="text-3xl font-black text-gray-900">Notifications</h1><div class="mt-6 divide-y divide-gray-100">{% for notification in notifications %}<article class="py-4"><h2 class="font-bold">{{ notification.title }}</h2><p class="text-sm text-gray-500">{{ notification.body }}</p></article>{% empty %}<p class="text-gray-500">No notifications.</p>{% endfor %}</div></section>{% endblock %}
