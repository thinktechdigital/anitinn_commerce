{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="mt-8 flex items-center justify-between" aria-label="Pagination">
  {% if page_obj.has_previous %}<a class="btn-ghost" href="?page={{ page_obj.previous_page_number }}">Previous</a>{% else %}<span></span>{% endif %}
  <span class="text-sm font-bold text-gray-500">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}<a class="btn-ghost" href="?page={{ page_obj.next_page_number }}">Next</a>{% else %}<span></span>{% endif %}
</nav>
{% endif %}
