<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | ANITINN Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    :root {
      --royal-green: #1B5E3F;
      --golden-yellow: #D4A520;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .bg-royal-green {
      background-color: var(--royal-green);
    }
    .text-royal-green {
      color: var(--royal-green);
    }
    .text-golden-yellow {
      color: var(--golden-yellow);
    }
    .border-royal-green {
      border-color: var(--royal-green);
    }
    .focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(27, 94, 63, 0.2);
      border-color: var(--royal-green);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-green-50 min-h-screen flex flex-col items-center justify-center p-6">
  
  <!-- Logo Area -->
  <div class="mb-10 text-center">
    <a href="/" id="brand-logo-link" class="inline-block">
      <img src="https://vgbujcuwptvheqijyjbe.supabase.co/storage/v1/object/public/hmac-uploads/uploads/ef5bc30d-cbeb-42a5-88a1-362daf4d51a4/1780139179048-642ea9dd/ChatGPT_Image_May_29__2026__11_28_10_AM.png" 
           alt="ANITINN Logo" 
           class="w-20 h-20 rounded-full border-4 border-white shadow-lg mx-auto mb-4">
    </a>
    <h1 class="text-3xl font-bold text-gray-900 tracking-tight">ANITINN</h1>
    <p class="text-gray-500 font-medium">Ghana's AI-Powered Marketplace</p>
  </div>

  <!-- Password Reset Card -->
  <div class="w-full max-w-[480px] bg-white rounded-[2.5rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.08)] p-10 md:p-14 border border-gray-100">
    <div class="text-center mb-10">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Reset Password</h2>
      <p class="text-sm text-gray-500 leading-relaxed">Enter your registered email address below, and we'll send you instructions to reset your password.</p>
    </div>

    <!-- Reset Form -->
    <form action="#" class="space-y-6">
      <div>
        <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Email Address</label>
        <input type="email" id="email" name="email" placeholder="name@company.com" required
               class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus-ring transition-all placeholder:text-gray-400 text-gray-800">
      </div>

      <button type="submit" 
              class="w-full py-4.5 bg-royal-green text-white font-bold rounded-2xl shadow-[0_12px_24px_-8px_rgba(27,94,63,0.4)] hover:shadow-[0_16px_32px_-8px_rgba(27,94,63,0.5)] hover:-translate-y-0.5 active:translate-y-0 transition-all text-lg flex items-center justify-center gap-3 group">
        Send Reset Link
        <iconify-icon icon="lucide:arrow-right" class="group-hover:translate-x-1 transition-transform"></iconify-icon>
      </button>
    </form>

    <div class="mt-10 text-center">
      <p class="text-gray-500 font-semibold">
        Remember your password? 
        <a href="/login/" class="text-royal-green underline decoration-golden-yellow decoration-2 underline-offset-4 ml-1">Back to Sign In</a>
      </p>
    </div>
  </div>

  <!-- Footer links -->
  <div class="mt-12 flex gap-6">
    <a href="/privacy/" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-gray-600">Privacy Policy</a>
    <a href="/terms/" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-gray-600">Terms of Service</a>
    <a href="/contact/" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-gray-600">Help Center</a>
  </div>

</body>
</html>
