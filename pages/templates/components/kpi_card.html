<article class="surface-card p-6">
  <div class="flex items-start justify-between gap-4">
    <div class="w-12 h-12 rounded-2xl {{ icon_bg|default:'royal-green' }} text-white grid place-items-center">
      <iconify-icon icon="{{ icon|default:'lucide:activity' }}" class="text-2xl"></iconify-icon>
    </div>
    {% if trend %}<span class="text-xs font-black text-green-600">{{ trend }}</span>{% endif %}
  </div>
  <p class="mt-5 text-xs font-black uppercase tracking-widest text-gray-400">{{ label }}</p>
  <p class="mt-2 text-3xl font-black text-gray-900">{{ value|default:"0" }}</p>
</article>
