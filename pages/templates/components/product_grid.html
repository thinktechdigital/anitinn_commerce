{% if products %}
<div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
  {% for product in products %}
  {% include "components/product_card.html" with product=product %}
  {% endfor %}
</div>
{% else %}
<section class="surface-card p-12 text-center">
  <iconify-icon icon="lucide:package-search" class="text-5xl text-golden-yellow"></iconify-icon>
  <h2 class="mt-4 text-xl font-black text-gray-900">No products found</h2>
  <p class="mt-2 text-gray-500">Try a different search or category.</p>
</section>
{% endif %}
