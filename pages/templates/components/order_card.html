<article class="surface-card p-6">
  <div class="flex items-start justify-between gap-4">
    <div><p class="text-xs font-black uppercase tracking-widest text-gray-400">Order</p><h3 class="text-xl font-black text-gray-900">#{{ order.id }}</h3></div>
    {% include "components/order_status_badge.html" with status=order.status %}
  </div>
  <p class="mt-4 text-sm text-gray-500">{{ order.created_at|date:"M d, Y" }}</p>
  <div class="mt-5 flex items-center justify-between">
    <p class="font-black text-royal-green">GH₵ {{ order.total_price }}</p>
    <a href="{% url 'pages:order_detail' order.id %}" class="btn-ghost py-2">View Details</a>
  </div>
</article>
