<span class="inline-flex items-center rounded-full px-3 py-1 text-[10px] font-black uppercase tracking-wider
{% if status == 'DELIVERED' or status == 'ACTIVE' or status == 'PAID' %}bg-green-100 text-green-700
{% elif status == 'CANCELLED' or status == 'FAILED' or status == 'REJECTED' %}bg-red-100 text-red-700
{% elif status == 'PENDING' or status == 'MODERATION' or status == 'REQUESTED' %}bg-amber-100 text-amber-700
{% else %}bg-gray-100 text-gray-700{% endif %}">
  {{ status|default:"Pending" }}
</span>
