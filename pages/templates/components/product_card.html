<article class="surface-card overflow-hidden group">
  <a href="{% url 'pages:product_detail' product.id %}" class="block aspect-square bg-gray-50">
    {% if product.image_url %}<img src="{{ product.image_url }}" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">{% else %}<div class="w-full h-full grid place-items-center text-gray-300"><iconify-icon icon="lucide:box" class="text-5xl"></iconify-icon></div>{% endif %}
  </a>
  <div class="p-5">
    <p class="text-xs font-bold text-golden-yellow uppercase tracking-wider">{{ product.category.name|default:"Marketplace" }}</p>
    <h3 class="mt-1 font-black text-gray-900 leading-tight">{{ product.name }}</h3>
    <p class="mt-1 text-sm text-gray-500">{{ product.vendor.store_name }}</p>
    <div class="mt-4 flex items-center justify-between gap-3">
      <p class="text-xl font-black text-royal-green">GH₵ {{ product.price }}</p>
      <form method="post" action="{% url 'pages:add_to_cart' product.id %}">
        {% csrf_token %}
        <button class="btn-accent p-3" aria-label="Add {{ product.name }} to cart"><iconify-icon icon="lucide:plus"></iconify-icon></button>
      </form>
    </div>
  </div>
</article>
