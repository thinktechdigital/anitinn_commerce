{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --royal-green: #1B5E3F;
      --royal-green-dark: #144a32;
      --golden-yellow: #D4A520;
      --warm-white: #fcfbf8;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--warm-white);
      color: #1f2937;
    }
    .royal-green { background-color: var(--royal-green); }
    .text-royal-green { color: var(--royal-green); }
    .bg-golden-yellow { background-color: var(--golden-yellow); }
    .text-golden-yellow { color: var(--golden-yellow); }
    .border-royal-green { border-color: var(--royal-green); }
    .border-golden-yellow { border-color: var(--golden-yellow); }
    
    .custom-shadow {
      box-shadow: 0 10px 30px -10px rgba(27, 94, 63, 0.1);
    }
    .category-card:hover .icon-bg {
      background-color: var(--golden-yellow);
      color: white;
      transform: translateY(-5px);
    }
    .hero-gradient {
      background: linear-gradient(135deg, #1B5E3F 0%, #144a32 100%);
    }
  </style>
  <title>{% block title %}{{ page_title|default:"Anitinn" }}{% endblock %} · Anitinn</title>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
{% block extra_scripts %}{% endblock %}
</body>
</html>
